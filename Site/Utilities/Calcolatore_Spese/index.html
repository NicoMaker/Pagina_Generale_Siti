<body>
    <div class="container">
        <div class="app-header">
            <h1>💰 SplitSpesa</h1>
            <p>Dividi spese equamente o con percentuali personalizzate</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="totale">💵 Totale spesa (€)</label>
                <input type="number" id="totale" step="0.01" placeholder="es. 120.50" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="persone">👥 Numero di persone</label>
                <input type="number" id="persone" min="1" step="1" placeholder="es. 4" autocomplete="off">
            </div>

            <button id="generaPersoneBtn" class="btn-primary">Genera persone</button>
        </div>

        <div id="personeContainer" class="persone-container" style="display: none;">
            <div class="card">
                <h3>👤 Imposta percentuali / quote</h3>
                <p class="info-text">Lascia vuoto per uguale ripartizione. La somma delle % deve essere 100%</p>
                <div id="personeList"></div>
                <div id="percentualeAlert" class="alert" style="display: none;"></div>
                <button id="calcolaBtn" class="btn-success">🧮 Calcola spese</button>
            </div>
        </div>

        <div id="risultatiContainer" class="risultati-container" style="display: none;">
            <div class="card">
                <h3>📋 Risultati</h3>
                <div id="risultatiList"></div>
                <button id="copiaBtn" class="btn-secondary">📋 Copia messaggio</button>
                <button id="resetBtn" class="btn-danger">🔄 Nuovo calcolo</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
