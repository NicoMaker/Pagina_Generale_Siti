<body>
    <div class="container">
        <div class="app-header">
            <h1>💰 SplitSpesa</h1>
            <p>Dividi spese con amici</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="totale">💵 Totale spesa (€)</label>
                <input type="number" id="totale" step="0.01" placeholder="es. 120.50" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="persone">👥 Numero di persone</label>
                <input type="number" id="persone" min="1" step="1" placeholder="es. 4" autocomplete="off">
            </div>

            <!-- SCELTA MODALITÀ PRIMA -->
            <div class="form-group">
                <label>🎯 Modalità di divisione</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="modalita" value="uguali" checked> 
                        <span>⚡ Tutti uguali</span>
                        <small>Divisione equa automatica</small>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="modalita" value="personalizzata"> 
                        <span>📊 Personalizzata</span>
                        <small>Imposta percentuali diverse</small>
                    </label>
                </div>
            </div>

            <button id="generaBtn" class="btn-primary">Continua →</button>
        </div>

        <!-- Sezione modifica nomi (solo per personalizzata) -->
        <div id="personalizzataSection" class="card" style="display: none;">
            <h3>✏️ Modifica nomi e percentuali</h3>
            <p class="info-text">
                Lascia % vuota per divisione automatica sulla parte restante.<br>
                La somma delle % inserite può essere ≤ 100.
            </p>
            <div id="personeListPersonalizzata"></div>
            <div id="percentualeAlert" class="alert" style="display: none;"></div>
            <button id="calcolaPersonalizzataBtn" class="btn-success">🧮 Calcola</button>
            <button id="annullaPersonalizzataBtn" class="btn-outline" style="margin-top: 10px;">← Indietro</button>
        </div>

        <!-- SEZIONE RISULTATI -->
        <div id="risultatiContainer" class="risultati-container" style="display: none;">
            <div class="card">
                <h3>📋 Risultati</h3>
                <div id="risultatiList"></div>
                <button id="copiaBtn" class="btn-secondary">📋 Copia messaggio</button>
                <button id="resetBtn" class="btn-danger">🔄 Nuovo calcolo</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
