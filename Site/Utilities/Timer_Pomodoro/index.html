<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="https://tse1.mm.bing.net/th/id/OIP.9r5STwa2bMf0DFatbS_5qwHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"
      type="image/jpg"
    />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="status" id="status">Pronto a partire</div>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="timer-display" id="timerDisplay">25:00</div>

        <div class="controls">
          <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">
            Avvia
          </button>
          <button class="btn" id="resetBtn" onclick="resetTimer()">
            Ripristina
          </button>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Sessioni completate</div>
            <div class="stat-value" id="sessionsCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pausa totale</div>
            <div class="stat-value" id="breakTime">0m</div>
          </div>
        </div>

        <div class="settings">
          <div class="settings-title">Impostazioni</div>
          <div class="setting-row">
            <label>Durata lavoro (min)</label>
            <input
              type="number"
              id="workDuration"
              value="25"
              min="1"
              max="60"
              onchange="resetTimer()"
            />
          </div>
          <div class="setting-row">
            <label>Durata pausa (min)</label>
            <input
              type="number"
              id="breakDuration"
              value="5"
              min="1"
              max="30"
              onchange="resetTimer()"
            />
          </div>
          <div class="setting-row">
            <label class="checkbox-label">
              <input type="checkbox" id="soundToggle" checked />
              Suoni abilitati
            </label>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
