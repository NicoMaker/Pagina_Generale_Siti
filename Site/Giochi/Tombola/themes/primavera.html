<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tombola di Pasqua</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/themes.css" />
    <link rel="icon" href="../assets/images/Conigletto.jpg" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="../js/game.js" defer></script>
  </head>

  <body class="game-page spring-theme">
    <div class="game-container">
      <header class="game-header">
        <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Indietro</a>
        <h1 class="game-title">Tombola di Pasqua</h1>
      </header>

      <!-- Estrai / Resetta -->
      <div class="game-controls">
        <button id="extractBtn" class="game-btn primary">
          <i class="fas fa-random"></i> <span>Estrai Numero</span>
        </button>
        <button id="resetBtn" class="game-btn secondary">
          <i class="fas fa-redo"></i> <span>Resetta Tabellone</span>
        </button>
      </div>

      <!-- Controlli automatici + Annuncia (tutto inline, due colonne) -->
      <div class="inline-controls-grid">

        <!-- BOX: Automatico -->
        <div class="control-box">
          <div class="control-box-title"><i class="fas fa-clock"></i> Estrazione Automatica</div>
          <div class="control-box-row">
            <label for="intervalInput">Intervallo (secondi):</label>
            <input type="range" id="intervalInput" min="1" max="30" value="3" />
            <span id="intervalLabel">3s</span>
          </div>
          <button id="autoBtn" class="game-btn success">
            <i class="fas fa-play"></i> <span>Avvia Automatico</span>
          </button>
        </div>

        <!-- BOX: Annuncia Numeri -->
        <div class="control-box">
          <div class="control-box-title"><i class="fas fa-bullhorn"></i> Annuncia Numeri Estratti</div>

          <!-- Modalità -->
          <div class="control-box-row label-row">
            <label><i class="fas fa-list-ol"></i> Modalità:</label>
            <div class="mode-btn-group">
              <button class="mode-btn active" data-mode="all" onclick="setAnnounceMode('all', this)">Tutti</button>
              <button class="mode-btn" data-mode="count" onclick="setAnnounceMode('count', this)">Ultimi N</button>
              <button class="mode-btn" data-mode="range" onclick="setAnnounceMode('range', this)">Range</button>
            </div>
          </div>

          <!-- Sezione TUTTI -->
          <div id="modeAll" class="announce-sub-section">
            <div class="control-box-row">
              <label>Quanti:</label>
              <select id="announceQtyAll">
                <option value="all">Tutti</option>
                <option value="5">Ultimi 5</option>
                <option value="10">Ultimi 10</option>
                <option value="15">Ultimi 15</option>
                <option value="20">Ultimi 20</option>
                <option value="30">Ultimi 30</option>
                <option value="50">Ultimi 50</option>
              </select>
            </div>
          </div>

          <!-- Sezione ULTIMI N -->
          <div id="modeCount" class="announce-sub-section hidden">
            <div class="control-box-row preset-row">
              <button class="preset-btn active" data-val="all" onclick="setCountPreset('all', this)">Tutti</button>
              <button class="preset-btn" data-val="10" onclick="setCountPreset(10, this)">10</button>
              <button class="preset-btn" data-val="15" onclick="setCountPreset(15, this)">15</button>
              <button class="preset-btn" data-val="20" onclick="setCountPreset(20, this)">20</button>
              <button class="preset-btn" data-val="25" onclick="setCountPreset(25, this)">25</button>
              <button class="preset-btn" data-val="30" onclick="setCountPreset(30, this)">30</button>
            </div>
            <div class="control-box-row">
              <label>Oppure:</label>
              <input type="number" id="customCountInput" min="1" max="90" placeholder="N personalizzato" style="width:130px;" />
            </div>
          </div>

          <!-- Sezione RANGE -->
          <div id="modeRange" class="announce-sub-section hidden">
            <div class="control-box-row preset-row">
              <button class="preset-btn active" data-from="1" data-to="10" onclick="setRangePreset(1,10,this)">1-10</button>
              <button class="preset-btn" data-from="1" data-to="20" onclick="setRangePreset(1,20,this)">1-20</button>
              <button class="preset-btn" data-from="1" data-to="30" onclick="setRangePreset(1,30,this)">1-30</button>
              <button class="preset-btn" data-from="1" data-to="50" onclick="setRangePreset(1,50,this)">1-50</button>
              <button class="preset-btn" data-from="51" data-to="90" onclick="setRangePreset(51,90,this)">51-90</button>
            </div>
            <div class="control-box-row">
              <label>Da:</label>
              <input type="number" id="rangeFrom" min="1" max="90" value="1" style="width:65px;" />
              <label>A:</label>
              <input type="number" id="rangeTo" min="1" max="90" value="90" style="width:65px;" />
            </div>
          </div>

          <!-- Velocità annuncio -->
          <div class="control-box-row">
            <label><i class="fas fa-tachometer-alt"></i> Velocità:</label>
            <input type="range" id="announceSpeed" min="1" max="6" value="2" step="0.5" />
            <span id="speedLabel">2s</span>
          </div>

          <!-- Controlla numero -->
          <div class="control-box-row">
            <label><i class="fas fa-search"></i> Controlla:</label>
            <input type="number" id="checkNumberInput" min="1" max="90" placeholder="1-90" style="width:80px;" />
            <button class="mini-btn" onclick="checkNumber()"><i class="fas fa-search"></i></button>
          </div>
          <div id="checkResult" class="check-result hidden"></div>

          <!-- Azioni annuncio -->
          <div class="control-box-row announce-action-row">
            <button id="startAnnounceBtn" class="game-btn primary small-btn" onclick="startAnnouncement()">
              <i class="fas fa-play"></i> <span>Avvia Annuncio</span>
            </button>
            <button id="stopAnnounceBtn" class="game-btn danger small-btn hidden" onclick="stopAnnouncement()">
              <i class="fas fa-stop"></i> <span>Ferma</span>
            </button>
          </div>
          <div id="announceProgress" class="announce-progress hidden">
            <span id="announceProgressText">Annunciando...</span>
          </div>
        </div>

      </div>
      <!-- fine inline-controls-grid -->

      <div class="current-number-display">
        <div class="number-circle" id="currentNumber"><span>?</span></div>
        <p>Ultimo numero estratto</p>
      </div>

      <div class="extracted-numbers">
        <h3>Numeri Estratti (0/90)</h3>
        <div id="extractedNumbersList" class="extracted-list"></div>
      </div>

      <div id="tombola-container" class="tombola-board"></div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>
  </body>
</html>
